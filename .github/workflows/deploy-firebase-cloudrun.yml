name: Deploy Firebase Hosting + Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-firebase-cloudrun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: asia-northeast1
      CLOUD_RUN_SERVICE: fengshui-api
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_MAPS_API_KEY_SERVER: ${{ secrets.GOOGLE_MAPS_API_KEY_SERVER }}
      GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FENSHUI_APP_URL: ${{ vars.VITE_FENSHUI_APP_URL }}
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run build

      - name: Sync secrets to Secret Manager
        run: |
          set -euo pipefail
          bash scripts/set_gcp_secrets.sh

      - name: Deploy backend (Cloud Run)
        run: |
          set -euo pipefail
          bash scripts/deploy_cloudrun.sh

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy hosting
        run: firebase deploy --only hosting --project "$GCP_PROJECT_ID" --non-interactive --force

      - name: Health check (Cloud Run)
        run: |
          set -euo pipefail
          RUN_URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT_ID" --format='value(status.url)')"
          echo "Cloud Run URL: $RUN_URL"
          for i in {1..20}; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$RUN_URL/docs" || true)"
            if [ "$code" = "200" ]; then
              echo "Cloud Run health check passed: $code"
              exit 0
            fi
            echo "retry $i: status=$code"
            sleep 5
          done
          echo "Cloud Run health check failed"
          exit 1

      - name: Health check (Firebase Hosting)
        run: |
          set -euo pipefail
          HOSTING_URL="https://${GCP_PROJECT_ID}.web.app"
          echo "Hosting URL: $HOSTING_URL"
          for i in {1..20}; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$HOSTING_URL" || true)"
            if [ "$code" = "200" ]; then
              echo "Hosting health check passed: $code"
              exit 0
            fi
            echo "retry $i: status=$code"
            sleep 5
          done
          echo "Hosting health check failed"
          exit 1